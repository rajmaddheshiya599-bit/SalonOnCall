services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/salon
      - JWT_SECRET=salon_premium_secure_key
    depends_on:
      - mongodb

  ml_service:
    build: ./ml_service
    ports:
      - "5000:5000"

volumes:
  mongo-data:
